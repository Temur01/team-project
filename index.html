<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans&family=Josefin+Sans:ital,wght@0,300;1,200;1,300&family=Lato&family=Montserrat&family=Nunito+Sans&family=Open+Sans:wght@300;400&family=Poppins:ital,wght@0,200;1,200&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css"
      integrity="sha512-Fo3rlrZj/k7ujTnHg4CGR2D7kSs0v4LLanw2qksYuRlEzO+tcaEPQogQ0KaoGN26/zrn20ImR1DfuLWnOo7aBA=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-1BmE4kWBq78iYhFldvKuhfTAU6auU8tT94WrHftjDbrCEXSU1oBoqyl2QvZ6jIW3"
      crossorigin="anonymous"
    />

    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <div class="container">
      <div class="row">
        <div class="col-12 col-md-6">
          <h2>Contact us</h2>
          <br />

          <input
            class="form-control"
            type="text"
            required
            id="name"
            name="name"
            placeholder="First name*"
          />
          <br /><br />
          <input
            class="form-control"
            type="email"
            required
            id="email"
            name="email"
            placeholder="Email adress*"
          />
          <br /><br />
          <textarea
            class="form-control"
            cols="60"
            rows="9"
            placeholder="Your message..."
          ></textarea>

          <button type="button" class="btn btn-primary">Send message</button>
        </div>
        <div class="col-12 col-md-6">
          <h2>How to find us</h2>
          <br />
          <img
            src="https://ukranews.com/upload/news/2016/12/27/5862211ddcd5a-screenshot-53_1200.jpg"
            class="img-thumbnail"
            alt="..."
          />
        </div>
      </div>

      <div class="row">
        <div class="col-12 col-md-6 col-lg-4 bg-white">
          <i class="fas fa-map-marked-alt"></i>
          <h3 class="fw-bolder">Get in touch</h3>
          <p class="text-capitalize fw-normal">
            10 Oxford Street,London,UK,1E EC
          </p>
          <p class="text-decoration-underline fw-normal">
            the-office@nexus.co.uk
          </p>
          <p class="fw-normal">+44 987 645 321</p>
        </div>
        <div class="col-12 col-md-6 col-lg-4 bg-blue">
          <i class="far fa-comments icon"></i>
          <h3 class="fw-bolder">Social media</h3>
          <p class="text-capitalize fw-normal">See below where you can find</p>
          <div class="icons">
            <i class="fab fa-twitter"></i>
            <i class="fab fa-facebook-square"></i>
            <i class="fab fa-instagram"></i>
            <i class="fab fa-skype"></i>
          </div>
        </div>
        <div class="col-12 col-md-6 col-lg-4 bg-grey">
          <i class="fas fa-link"></i>
          <h3 class="fw-bolder">Useful links</h3>
          <p class="text-capitalize fw-light">
            Our cookies policy meet the team behind nexus terms and conditions
          </p>
        </div>
      </div>
    </div>
  </body>
</html>
